<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<title>SPORTS SHOES | Reallyou</title>

<style>
body{
font-family:'Inter',system-ui,Arial;
margin:0;
background:#f5f5f5;
color:#222;
}

header{
background:#0b1f3a;
color:white;
text-align:center;
padding:40px 20px;
}
/* gender filter */
.filter-bar{
display:flex;
justify-content:center;
margin-bottom:20px;
}

#gender{
padding:10px 14px;
border:1px solid #ddd;
border-radius:8px;
background:white;
font-family:'Inter',sans-serif;
font-size:14px;
cursor:pointer;
}
.back{
color:white;
text-decoration:none;
border:1px solid white;
padding:8px 15px;
border-radius:5px;
display:inline-block;
margin-top:10px;
}

/* tabs */
.tabs{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:20px;
}

.tab{
padding:10px 15px;
border:1px solid #ccc;
background:white;
cursor:pointer;
border-radius:6px;
}

.tab.active{
background:#0b1f3a;
color:white;
}

/* layout */
.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

/* card */
.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

/* ===== 主图（缩小 + 更清晰）===== */
.card > img{
width:100%;
height:220px;
object-fit:contain;
background:#fff;
padding:10px;
border-bottom:1px solid #eee;
transition:.3s;
}

.card:hover > img{
transform:scale(1.02);
}

/* info */
.product-info{
padding:12px;
}

.product-info h3{
margin:5px 0 8px;
font-size:15px;
color:#0b1f3a;
}

/* ===== 缩略图（更小更精致）===== */
.color-options{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-top:10px;
}

.thumb{
width:68px;
height:52px;

object-fit:contain;

background:#fff;
padding:4px;

border:1px solid #ddd;
border-radius:8px;
cursor:pointer;
transition:.2s;
}    /* ↓ 缩小 */


.thumb:hover{
transform:scale(1.08);
border-color:#0b1f3a;
}

.thumb.active{
border-color:#0b1f3a;
box-shadow:0 0 0 2px rgba(11,31,58,.18);
}

/* button */
.wa-btn{
display:block;
margin-top:10px;
background:#25D366;
color:white;
text-align:center;
padding:8px;
border-radius:6px;
text-decoration:none;
font-weight:600;
font-size:13px;
}

.wa-btn:hover{
background:#1ebe5d;
}
</style>
</head>

<body>

<header>
<h1>Sports Shoes</h1>
<p>Sourcing & Development for Global Brands</p>
<a href="index.html" class="back">Back to Home</a>
</header>

<div class="filter-bar">
<select id="gender">
<option value="all">Gender: All</option>
<option value="men">Men</option>
<option value="women">Women</option>
</select>
</div>

<div class="tabs">
<div class="tab active" onclick="setTab('sneakers',this)">Sneakers</div>
<div class="tab" onclick="setTab('football',this)">Football Shoes</div>
<div class="tab" onclick="setTab('basketball',this)">Basketball Shoes</div>
</div>

<div class="container">
<div class="grid" id="productGrid"></div>
</div>

let currentTab = "sneakers";
document.getElementById("gender")
.addEventListener("change", applyFilter);
function renderProducts(){

const grid = document.getElementById("productGrid");
grid.innerHTML = "";

products.forEach(p=>{

let thumbs = "";

p.colors.forEach((img,i)=>{
thumbs += `
<img class="thumb ${i===0?'active':''}"
src="${img}"
onclick="changeColor('${p.id}','${img}',this)">
`;
});

grid.innerHTML += `
<div class="card"
data-tab="${p.tab}"
data-gender="${p.gender}">

<img id="${p.id}" src="${p.colors[0]}">

<div class="product-info">

<h3>${p.name}</h3>
<p><strong>MOQ:</strong> ${p.moq}</p>
<p><strong>Material:</strong> ${p.material}</p>

<div class="color-options">
${thumbs}
</div>

<a class="wa-btn"
href="https://wa.me/8618659004495?text=Hello%20Reallyou,%20I%20am%20interested%20in%20this%20shoe."
target="_blank">
Send Inquiry
</a>

</div>
</div>
`;
});

applyFilter();
}

function changeColor(id,img,el){
document.getElementById(id).src = img;

const group = el.parentElement.querySelectorAll(".thumb");
group.forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}

function setTab(tab,element){

currentTab = tab;

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

element.classList.add("active");

applyFilter();

}

function applyFilter(){

const gender =
document.getElementById("gender").value;

document.querySelectorAll(".card").forEach(card=>{

const matchTab =
card.dataset.tab === currentTab;

const matchGender =
gender === "all" ||
card.dataset.gender === gender;

card.style.display =
(matchTab && matchGender)
? "block"
: "none";

});

}

window.onload = renderProducts;

</script>
