<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Shoes | Reallyou</title>

<style>

/* ===== BASE ===== */
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
color:#222;
}

header{
background:#0b1f3a;
color:white;
text-align:center;
padding:40px 20px;
}

.back{
color:white;
text-decoration:none;
border:1px solid white;
padding:8px 15px;
border-radius:5px;
display:inline-block;
margin-top:10px;
}

/* ===== TABS ===== */
.tabs{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:20px;
}

.tab{
padding:10px 15px;
border:1px solid #ccc;
background:white;
cursor:pointer;
border-radius:6px;
}

.tab.active{
background:#0b1f3a;
color:white;
}

/* ===== FILTER ===== */
.filter-bar{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

select{
padding:8px;
border-radius:5px;
}

/* ===== GRID ===== */
.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* ===== CARD ===== */
.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
background:#fff;
padding:12px;
border-bottom:1px solid #eee;
transition:0.3s;
}

.card:hover img{
transform:scale(1.03);
}

.product-info{
padding:15px;
}

.product-info h3{
margin:5px 0 10px;
color:#0b1f3a;
}

/* ===== COLORS ===== */
.color-options{
display:flex;
gap:10px;
margin-top:10px;
}

.color{
width:22px;
height:22px;
border-radius:50%;
cursor:pointer;
border:2px solid #ddd;
transition:0.2s;
}

.color:hover{
transform:scale(1.2);
}

.black{background:#000;}
.grey{background:#888;}
.white{background:#fff;border:1px solid #ccc;}
.red{background:#c0392b;}
.blue{background:#2980b9;}

/* ===== BUTTON ===== */
.wa-btn{
display:block;
margin-top:12px;
background:#25D366;
color:white;
text-align:center;
padding:10px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.wa-btn:hover{
background:#1ebe5d;
}

</style>
</head>

<body>

<header>
<h1>Sports Shoes</h1>
<p>Sourcing & Development for Global Brands</p>
<a href="index.html" class="back">Back to Home</a>
</header>

<!-- ===== TABS ===== -->
<div class="tabs">
<div class="tab active" onclick="setTab('sneakers')">Sneakers</div>
<div class="tab" onclick="setTab('football')">Football Shoes</div>
<div class="tab" onclick="setTab('basketball')">Basketball Shoes</div>
</div>

<!-- ===== FILTER ===== -->
<div class="filter-bar">
<select id="gender">
<option value="all">Gender: All</option>
<option value="men">Men</option>
<option value="women">Women</option>
<option value="kids">Kids</option>
</select>

<select id="season">
<option value="all">Season: All</option>
<option value="summer">Summer</option>
<option value="winter">Winter</option>
</select>
</div>

<!-- ===== PRODUCTS ===== -->
<div class="container">
<div class="grid" id="productGrid"></div>
</div>

<script>

/* ======================
   1. PRODUCT DATABASE
====================== */
const products = [
{
id:"sneaker1",
name:"Men Running Sneaker",
tab:"sneakers",
gender:"men",
season:"summer",
moq:"600 pairs/color",
material:"Mesh + EVA Sole",
colors:[
{color:"black",img:"images/sports/M/sneaker1-black.jpg",class:"black"},
{color:"yellow",img:"images/sports/M/sneaker1-yellow.jpg",class:"yellow"},
{color:"white",img:"images/sports/M/sneaker1-white.jpg",class:"white"}
]
},

{
id:"s2",
name:"Women Casual Sneaker",
tab:"sneakers",
gender:"women",
season:"summer",
moq:"600 pairs/color",
material:"Mesh + EVA Sole",
colors:[
{color:"pink",img:"images/sports/W/s2-pink.jpg",class:"red"},
{color:"blue",img:"images/sports/W/s2-blue.jpg",class:"blue"}
]
},

{
id:"f1",
name:"FG Football Boot",
tab:"football",
gender:"men",
season:"summer",
moq:"600 pairs/color",
material:"PU + Rubber Sole",
colors:[
{color:"black",img:"images/football/f1-black.jpg",class:"black"},
{color:"white",img:"images/football/f1-white.jpg",class:"white"}
]
},

{
id:"b1",
name:"Basketball Shoe",
tab:"basketball",
gender:"men",
season:"winter",
moq:"600 pairs/color",
material:"Breathable Mesh",
colors:[
{color:"black",img:"images/basketball/b1-black.jpg",class:"black"},
{color:"blue",img:"images/basketball/b1-blue.jpg",class:"blue"}
]
}
];

/* ======================
   2. RENDER PRODUCTS
====================== */
function renderProducts(){

const grid = document.getElementById("productGrid");
grid.innerHTML = "";

products.forEach(p=>{

let colorsHTML = "";   // ✅ 必须初始化

p.colors.forEach(c=>{

colorsHTML += `
<span class="color"
style="background:${COLOR_MAP[c.color]}"
onclick="changeColor('${p.id}','${c.img}')">
</span>
`;
});

grid.innerHTML += `
<div class="card"
data-tab="${p.tab}"
data-gender="${p.gender}"
data-season="${p.season}">

<img id="${p.id}"
src="${p.colors[0].img}">

<div class="product-info">

<h3>${p.name}</h3>
<p>MOQ: ${p.moq}</p>
<p>Material: ${p.material}</p>

<div class="color-options">
${colorsHTML}
</div>

<a class="wa-btn"
href="https://wa.me/8618659004495?text=Inquiry%20for%20${p.name}"
target="_blank">
💬 Send Inquiry
</a>

</div>
</div>
`;

});

applyFilter();
}
/* ======================
   3. CHANGE COLOR
====================== */
function changeColor(id,img){
document.getElementById(id).src = img;
}

/* ======================
   4. FILTER SYSTEM
====================== */
let currentTab = "sneakers";

function setTab(tab){
currentTab = tab;
applyFilter();
updateTabUI(tab);
}

function updateTabUI(tab){
document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("active");
if(t.innerText.toLowerCase().includes(tab)){
t.classList.add("active");
}
});
}

document.getElementById("gender").addEventListener("change",applyFilter);
document.getElementById("season").addEventListener("change",applyFilter);

function applyFilter(){

const gender = document.getElementById("gender").value;
const season = document.getElementById("season").value;

document.querySelectorAll(".card").forEach(card=>{

const matchTab = card.dataset.tab === currentTab;
const matchGender = gender==="all" || card.dataset.gender===gender;
const matchSeason = season==="all" || card.dataset.season===season;

card.style.display =
(matchTab && matchGender && matchSeason) ? "block" : "none";

});

}
const COLOR_MAP = {
black: "#000000",
white: "#ffffff",
grey: "#888888",
red: "#c0392b",
blue: "#2980b9",
pink: "#ff69b4"
};

/* ======================
   INIT
====================== */
window.onload = renderProducts;

</script>

</body>
</html>
