<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<title>Sports Shoes | Reallyou</title>

<style>
body{
font-family:'Inter', system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
margin:0;
background:#f5f5f5;
color:#222;
}

header{
background:#0b1f3a;
color:white;
text-align:center;
padding:40px 20px;
}

.back{
color:white;
text-decoration:none;
border:1px solid white;
padding:8px 15px;
border-radius:5px;
display:inline-block;
margin-top:10px;
}

/* tabs */
.tabs{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:20px;
}

.tab{
padding:10px 15px;
border:1px solid #ccc;
background:white;
cursor:pointer;
border-radius:6px;
}

.tab.active{
background:#0b1f3a;
color:white;
}

/* filter */
.filter-bar{
display:flex;
justify-content:center;
margin-bottom:20px;
}

select{
padding:8px;
border-radius:5px;
}

/* layout */
.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* card */
.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

/* main image */
.card > img{
width:100%;
height:180px;
object-fit:contain;
background:#fff;
padding:12px;
border-bottom:1px solid #eee;
transition:.3s;
}

.card:hover > img{
transform:scale(1.03);
}

/* product info */
.product-info{
padding:15px;
}

.product-info h3{
margin:5px 0 10px;
color:#0b1f3a;
}

/* thumbnails */
.color-options{
display:flex;
gap:8px;
margin-top:12px;
flex-wrap:wrap;
}

.thumb{
width:60px;
height:45px;
object-fit:cover;
background:#fff;
border:2px solid #ddd;
border-radius:8px;
cursor:pointer;
padding:2px;
transition:.3s;
}

.thumb:hover{
border-color:#0b1f3a;
transform:scale(1.05);
}

.thumb.active{
border-color:#0b1f3a;
box-shadow:0 0 0 2px rgba(11,31,58,.25);
}

/* button */
.wa-btn{
display:block;
margin-top:12px;
background:#25D366;
color:white;
text-align:center;
padding:10px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.wa-btn:hover{
background:#1ebe5d;
}
</style>
</head>

<body>

<header>
<h1>Sports Shoes</h1>
<p>Sourcing & Development for Global Brands</p>
<a href="index.html" class="back">Back to Home</a>
</header>

<div class="tabs">
<div class="tab active" onclick="setTab('sneakers')">Sneakers</div>
<div class="tab" onclick="setTab('football')">Football Shoes</div>
<div class="tab" onclick="setTab('basketball')">Basketball Shoes</div>
</div>

<div class="filter-bar">
<select id="gender">
<option value="all">Gender: All</option>
<option value="men">Men</option>
<option value="women">Women</option>
</select>
</div>

<div class="container">
<div class="grid" id="productGrid"></div>
</div>

<script>

/* ===== PRODUCTS ===== */
const products = [
{
id:"sneaker1",
name:"Men Sneaker Type1",
tab:"sneakers",
gender:"men",
moq:"600 pairs/color",
material:"Mesh + EVA Sole",
colors:[
"images/sports/M/sneaker1-black.jpg",
"images/sports/M/sneaker1-yellow.jpg",
"images/sports/M/sneaker1-white.jpg"
]
},
{
id:"sneaker2",
name:"Women Sneaker Type1",
tab:"sneakers",
gender:"women",
moq:"600 pairs/color",
material:"Mesh + EVA Sole",
colors:[
"images/sports/W/sneaker2-pink.jpg",
"images/sports/W/sneaker2-blue.jpg",
"images/sports/W/sneaker2-yellow.jpg"
]
},
{
id:"sneaker3",
name:"Men Sneaker Type2",
tab:"sneakers",
gender:"men",
moq:"600 pairs/color",
material:"Mesh + EVA Sole",
colors:[
"images/sports/M/sneaker3-black.jpg",
"images/sports/M/sneaker3-blue.jpg"
]
}
];

/* ===== RENDER ===== */
function renderProducts(){

const grid = document.getElementById("productGrid");
grid.innerHTML = "";

products.forEach(p=>{

let colorsHTML = "";

p.colors.forEach((img,index)=>{

colorsHTML += `
<img class="thumb ${index===0?'active':''}"
src="${img}"
onclick="changeColor('${p.id}','${img}',this)">
`;
});

grid.innerHTML += `
<div class="card"
data-tab="${p.tab}"
data-gender="${p.gender}">

<img id="${p.id}" src="${p.colors[0]}">

<div class="product-info">

<h3>${p.name}</h3>
<p><strong>MOQ:</strong> ${p.moq}</p>
<p><strong>Material:</strong> ${p.material}</p>

<div class="color-options">
${colorsHTML}
</div>

<a class="wa-btn"
href="https://wa.me/8618659004495?text=Inquiry%20for%20${p.name}"
target="_blank">
💬 Send Inquiry
</a>

</div>
</div>
`;

});

applyFilter();
}

/* ===== CHANGE IMAGE ===== */
function changeColor(id,img,thumb){
document.getElementById(id).src = img;

const thumbs =
thumb.parentElement.querySelectorAll(".thumb");

thumbs.forEach(t=>t.classList.remove("active"));
thumb.classList.add("active");
}

/* ===== FILTER ===== */
let currentTab = "sneakers";

function setTab(tab){
currentTab = tab;
applyFilter();
}

document.getElementById("gender").addEventListener("change",applyFilter);

function applyFilter(){

document.querySelectorAll(".card").forEach(card=>{

const matchTab = card.dataset.tab === currentTab;
const matchGender =
document.getElementById("gender").value === "all"
|| card.dataset.gender === document.getElementById("gender").value;

card.style.display = (matchTab && matchGender) ? "block" : "none";
});

}

/* init */
window.onload = renderProducts;

</script>

</body>
</html>
