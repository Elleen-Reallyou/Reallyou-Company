/* ================= RENDER LIST ================= */
function renderList(){

const grid=document.getElementById("grid");
grid.innerHTML="";

products.forEach(p=>{

if(currentGender!="all" && p.gender!=currentGender) return;
if(currentTab!="all" && p.tab!=currentTab) return;

let thumbs="";

p.colors.forEach(img=>{
thumbs += `
<img
src="${img}"
class="thumb"
onclick="event.stopPropagation();changeMain('${p.id}',''${img}')">
`;
});   // ← 少了这一句

grid.innerHTML += `
<div class="card">

<img
id="main-${p.id}"
src="${p.colors[0]}"
class="main-image"
onclick="openDetail('${p.id}')">

<div class="product-info">

<h3>${p.name}</h3>

<p>${p.moq}</p>

<div class="thumbs">
${thumbs}
</div>

</div>

</div>
`;
});
}
function setGender(gender,el){

currentGender = gender;

document.querySelectorAll(".gender")
.forEach(g=>g.classList.remove("active"));

el.classList.add("active");

renderList();

}
function setTab(tab,el){
currentTab = tab;

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

el.classList.add("active");

renderList(); // ⭐必须重新渲染
}
/* ================= DETAIL ================= */
  function changeMain(id,img){
document.getElementById("main-"+id).src=img;
}
function changeDetailMain(img){

}

function openDetail(id){

const p = products.find(x => x.id === id);

let thumbs = "";

p.colors.forEach(img => {
thumbs += `
<img src="${img}"
style="width:60px;height:60px;object-fit:contain;border:1px solid #ddd;cursor:pointer"
onclick="changeDetailMain('${img}')"
`;
});
document.getElementById("detail").innerHTML = `

<img
id="detailMain"
src="${p.colors[0]}"
onclick="openLB(document.getElementById('detailMain').src)"
onmousemove="zoom(event)"
onmouseleave="resetZoom()">

<div>

`;



document.getElementById("listView").classList.remove("active");

}
function zoom(e){

const img=e.target;

const rect=img.getBoundingClientRect();

const x=((e.clientX-rect.left)/rect.width)*100;

const y=((e.clientY-rect.top)/rect.height)*100;

img.style.transformOrigin=`${x}% ${y}%`;

img.style.transform="scale(2)";

}

function resetZoom(){

document.querySelector("#detailMain").style.transform="scale(1)";

}

function zoom(e){

const img = e.target;

const rect = img.getBoundingClientRect();

const x = (e.clientX - rect.left) / rect.width * 100;
const y = (e.clientY - rect.top) / rect.height * 100;

img.style.transformOrigin = `${x}% ${y}%`;
img.style.transform = "scale(2)";

}

function resetZoom(){

document.getElementById("detailMain").style.transform = "scale(1)";

}
