<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Shoes | Reallyou</title>

<style>

/* ===== BASE ===== */
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
color:#222;
}

header{
background:#0b1f3a;
color:white;
text-align:center;
padding:40px 20px;
}

.back{
color:white;
text-decoration:none;
border:1px solid white;
padding:8px 15px;
border-radius:5px;
display:inline-block;
margin-top:10px;
}

/* ===== TABS ===== */
.tabs{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:20px;
}

.tab{
padding:10px 15px;
border:1px solid #ccc;
background:white;
cursor:pointer;
border-radius:6px;
}

.tab.active{
background:#0b1f3a;
color:white;
}

/* ===== FILTER ===== */
.filter-bar{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

select{
padding:8px;
border-radius:5px;
}

/* ===== GRID ===== */
.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* ===== CARD ===== */
.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

/* ===== IMAGE (关键修复) ===== */
.card > img{
width:100%;
height:180px;
object-fit:contain;
background:#fff;
padding:12px;
border-bottom:1px solid #eee;
transition:.3s;
}

.card:hover > img{
transform:scale(1.03);
}
.card:hover .thumb{
transform:none;
}
.product-info{
padding:15px;
}

.product-info h3{
margin:5px 0 10px;
color:#0b1f3a;
}

/* ===== COLORS ===== */
.color-options{
display:flex;
gap:8px;
margin-top:12px;
flex-wrap:wrap;
}

.thumb{
width:60px;
height:45px;
object-fit:contain;
background:#fff;
border:2px solid #ddd;
border-radius:8px;
cursor:pointer;
padding:3px;
transition:.3s;
}

.thumb:hover{
border-color:#0b1f3a;
transform:scale(1.08);
}

.thumb.active{
border-color:#0b1f3a;
box-shadow:0 0 0 2px rgba(11,31,58,.25);
transform:scale(1.05);
}


/* ===== BUTTON ===== */
.wa-btn{
display:block;
margin-top:12px;
background:#25D366;
color:white;
text-align:center;
padding:10px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.wa-btn:hover{
background:#1ebe5d;
}

</style>
</head>

<body>

<header>
<h1>Sports Shoes</h1>
<p>Sourcing & Development for Global Brands</p>
<a href="index.html" class="back">Back to Home</a>
</header>

<!-- ===== TABS ===== -->
<div class="tabs">
<div class="tab active" onclick="setTab('sneakers')">Sneakers</div>
<div class="tab" onclick="setTab('football')">Football Shoes</div>
<div class="tab" onclick="setTab('basketball')">Basketball Shoes</div>
</div>

<!-- ===== FILTER ===== -->
<div class="filter-bar">
<select id="gender">
<option value="all">Gender: All</option>
<option value="men">Men</option>
<option value="women">Women</option>
<option value="kids">Kids</option>
</select>
</div>

<!-- ===== PRODUCTS ===== -->
<div class="container">
<div class="grid" id="productGrid"></div>
</div>

<script>

/* ===== COLOR MAP ===== */
const COLOR_MAP = {
black:"#000000",
white:"#ffffff",
grey:"#888888",
red:"#c0392b",
blue:"#2980b9",
light blue:"#CFE8F7",
yellow:"#f1c40f",
light yellow:"#F6E7A1",
pink:"#ff69b4",
light pink:"#F8D7DA",
beige:"#D8C3A5",
};

/* ===== PRODUCTS ===== */
const products = [
{
id:"sneaker1",
name:"Men Sneaker Type1",
tab:"sneakers",
gender:"men",
moq:"600 pairs/color",
material:"Mesh + EVA Sole",
colors:[
{color:"black",img:"images/sports/M/sneaker1-black.jpg"},
{color:"yellow",img:"images/sports/M/sneaker1-yellow.jpg"},
{color:"white",img:"images/sports/M/sneaker1-white.jpg"}
]
},
{
id:"sneaker2",
name:"Women Sneaker Type1",
tab:"sneakers",
gender:"women",
moq:"600 pairs/color",
material:"Mesh + EVA Sole",
colors:[
{color:"light pink",img:"images/sports/W/sneaker2-pink.jpg"},
{color:"light blue",img:"images/sports/W/sneaker2-blue.jpg"},
{color:"light yellow",img:"images/sports/W/sneaker2-yellow.jpg"},
]
},
{
id:"sneaker3",
name:"Men Sneaker Type2",
tab:"sneakers",
gender:"men",
moq:"600 pairs/color",
material:"Mesh、Rubber printing + TPR、Phylon Sole",
colors:[
{color:"black",img:"images/sports/M/sneaker3-black.jpg"},
{color:"blue",img:"images/sports/M/sneaker3-blue.jpg"},
]
},
{
id:"sneaker4",
name:"Men Sneaker Type3",
tab:"sneakers",
gender:"men",
moq:"600 pairs/color",
material:"Mesh、Rubber printing + TPR、Phylon Sole",
colors:[
{color:"yellow",img:"images/sports/M/sneaker4-yellow.jpg"},
{color:"green",img:"images/sports/M/sneaker4-green.jpg"},
{color:"beige",img:"images/sports/M/sneaker4-beige.jpg"},
]
},
{
id:"football1",
name:"FG Football Boot",
tab:"football",
gender:"men",
moq:"600 pairs/color",
material:"PU + Rubber Sole",
colors:[
{color:"black",img:"images/football/f1-black.jpg"},
{color:"white",img:"images/football/f1-white.jpg"}
]
},
{
id:"basket1",
name:"Basketball Shoe",
tab:"basketball",
gender:"men",
moq:"600 pairs/color",
material:"Breathable Mesh",
colors:[
{color:"black",img:"images/basketball/b1-black.jpg"},
{color:"blue",img:"images/basketball/b1-blue.jpg"}
]
}
];

/* ===== RENDER ===== */
function renderProducts(){

const grid = document.getElementById("productGrid");
grid.innerHTML = "";

products.forEach(p=>{

let colorsHTML = "";

p.colors.forEach((c,index)=>{

colorsHTML += `
<img
class="thumb ${index===0 ? 'active' : ''}"
src="${c.img}"
onclick="changeColor('${p.id}','${c.img}',this)">
`;

});

grid.innerHTML += `
<div class="card"
data-tab="${p.tab}"
data-gender="${p.gender}">

<img id="${p.id}"
src="${p.colors[0].img}">

<div class="product-info">

<h3>${p.name}</h3>
<p><strong>MOQ:</strong> ${p.moq}</p>
<p><strong>Material:</strong> ${p.material}</p>

<div class="color-options">
${colorsHTML}
</div>

<a class="wa-btn"
href="https://wa.me/8618659004495?text=Inquiry%20for%20${p.name}"
target="_blank">
💬 Send Inquiry
</a>

</div>
</div>
`;

});

applyFilter();
}

/* ===== COLOR CHANGE ===== */
function changeColor(id,img,thumb){

document.getElementById(id).src = img;

const thumbs =
thumb.parentElement.querySelectorAll(".thumb");

thumbs.forEach(t=>{
t.classList.remove("active");
});

thumb.classList.add("active");

}

/* ===== FILTER ===== */
let currentTab = "sneakers";

function setTab(tab){
currentTab = tab;
applyFilter();
updateTabUI(tab);
}

function updateTabUI(tab){
document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("active");
if(t.innerText.toLowerCase().includes(tab)){
t.classList.add("active");
}
});
}

document.getElementById("gender").addEventListener("change",applyFilter);

function applyFilter(){

document.querySelectorAll(".card").forEach(card=>{

const matchTab = card.dataset.tab === currentTab;
const matchGender = document.getElementById("gender").value === "all"
|| card.dataset.gender === document.getElementById("gender").value;


card.style.display = (matchTab && matchGender )
? "block"
: "none";

});

}

/* ===== INIT ===== */
window.onload = renderProducts;

</script>

</body>
</html>
