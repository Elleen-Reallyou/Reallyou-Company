<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CASUAL SHOES | Reallyou</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Inter',system-ui,Arial;
margin:0;
background:#f5f5f5;
color:#222;
}

header{
background:#0b1f3a;
color:white;
text-align:center;
padding:40px 20px;
}

.back{
color:white;
text-decoration:none;
border:1px solid white;
padding:8px 15px;
border-radius:5px;
display:inline-block;
margin-top:10px;
}

/* tabs */
.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:20px;
flex-wrap:wrap;
}

.tab{
padding:10px 15px;
border:1px solid #ccc;
background:white;
cursor:pointer;
border-radius:6px;
}

.tab.active{
background:#0b1f3a;
color:white;
}

/* layout */
.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

/* card */
.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.card > img{
width:100%;
height:180px;
object-fit:contain;
background:#fff;
padding:12px;
border-bottom:1px solid #eee;
}

/* info */
.product-info{
padding:15px;
}

.product-info h3{
margin:5px 0 10px;
color:#0b1f3a;
}

/* thumbs */
.color-options{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}

.thumb{
width:68px;
height:52px;

object-fit:contain;

background:#fff;
padding:4px;

border:1px solid #ddd;
border-radius:8px;
cursor:pointer;
transition:.2s;
}
.thumb:hover{
transform:scale(1.05);
border-color:#0b1f3a;
}

.thumb.active{
border-color:#0b1f3a;
box-shadow:0 0 0 2px rgba(11,31,58,.2);
}

/* button */
.wa-btn{
display:block;
margin-top:12px;
background:#25D366;
color:white;
text-align:center;
padding:10px;
border-radius:8px;
text-decoration:none;
font-weight:600;
}
</style>
</head>

<body>

<header>
<h1>CASUAL SHOES</h1>
<p> Vulcanized • Skate • Slip-on</p>
<a class="back" href="index.html">Back to Home</a>
</header>

<!-- TABS -->
<div class="tabs">
<div class="tab active" onclick="setTab('vulcanized')">Vulcanized</div>
<div class="tab" onclick="setTab('skate')">Skate</div>
<div class="tab" onclick="setTab('slipon')">Slip-on</div>
</div>

<!-- GRID -->
<div class="container">
<div class="grid" id="productGrid"></div>
</div>

<script>

/* ===== DATA（完全统一 key） ===== */
const products = [
{
id:"skate1",
name:"Skate Shoe Type 1",
tab:"skate",
gender:"men",
moq:"600 pairs/color",
material:"Canvas + Rubber sole",
colors:[
{img:"images/casual/M/skate1-green.jpg"},
{img:"images/casual/M/skate1-beige.jpg"},
{img:"images/casual/M/skate1-grey.jpg"}
]
},
{
id:"skate2",
name:"Skate Shoe Type 2",
tab:"skate",
gender:"women",
moq:"600 pairs/color",
material:"Cow suede&PU + Rubber sole",
colors:[
{img:"images/casual/W/skate2-black.jpg"},
{img:"images/casual/W/skate2-brown.jpg"},
{img:"images/casual/W/skate2-beige.jpg"},
{img:"images/casual/W/skate2-white.jpg"},
{img:"images/casual/W/skate2-yellow.jpg"}
]
},
{
id:"skate3",
name:"Skate Shoe Type 3",
tab:"skate",
gender:"women",
moq:"600 pairs/color",
material:"Cow suede + Rubber sole",
colors:[
{img:"images/casual/W/skate3-gold.jpg"},
{img:"images/casual/W/skate3-brown.jpg"},
{img:"images/casual/W/skate3-beige.jpg"},
{img:"images/casual/W/skate3-white.jpg"},
{img:"images/casual/W/skate3-pink.jpg"}
]
},
{
id:"skate4",
name:"Skate Shoe Type 4",
tab:"skate",
gender:"women",
moq:"600 pairs/color",
material:"Mesh + TPR sole",
colors:[
{img:"images/casual/W/skate4-purple.jpg"},
{img:"images/casual/W/skate4-white.jpg"}
]
},
{
id:"skate5",
name:"Skate Shoe Type 5",
tab:"skate",
gender:"women",
moq:"600 pairs/color",
material:"Mesh + TPR sole",
colors:[
{img:"images/casual/W/skate5-white.jpg"}
]
}
];

/* ===== STATE ===== */
let currentTab = "skate";

/* ===== RENDER ===== */
function renderProducts(){

const grid = document.getElementById("productGrid");
grid.innerHTML = "";

products.forEach(p=>{

let colorsHTML = "";

p.colors.forEach((c,index)=>{
colorsHTML += `
<img class="thumb ${index===0?'active':''}"
src="${c.img}"
onclick="changeColor('${p.id}','${c.img}',this)">
`;
});

grid.innerHTML += `
<div class="card"
data-tab="${p.tab}"
data-gender="${p.gender}">

<img id="${p.id}" src="${p.colors[0].img}">

<div class="product-info">

<h3>${p.name}</h3>
<p><strong>MOQ:</strong> ${p.moq}</p>
<p><strong>Material:</strong> ${p.material}</p>

<div class="color-options">
${colorsHTML}
</div>

<a class="wa-btn"
href="https://wa.me/8618659004495"
target="_blank">
Send Inquiry
</a>

</div>
</div>
`;
});

applyFilter();
}

/* ===== CHANGE IMAGE ===== */
function changeColor(id,img,thumb){
document.getElementById(id).src = img;

const thumbs = thumb.parentElement.querySelectorAll(".thumb");
thumbs.forEach(t=>t.classList.remove("active"));
thumb.classList.add("active");
}

/* ===== TAB ===== */
function setTab(tab){
currentTab = tab;
applyFilter();
updateTabUI();
}

/* ===== TAB UI ===== */
function updateTabUI(){
document.querySelectorAll(".tab").forEach(t=>{
t.classList.remove("active");
if(t.getAttribute("onclick").includes(currentTab)){
t.classList.add("active");
}
});
}

/* ===== FILTER ===== */
function applyFilter(){

document.querySelectorAll(".card").forEach(card=>{

const matchTab = card.dataset.tab === currentTab;

card.style.display = matchTab ? "block" : "none";
});
}

/* ===== INIT ===== */
window.onload = renderProducts;

</script>

</body>
</html>
</html>
